<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词闪卡系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .header-stats {
            display: flex;
            gap: 20px;
            font-size: 14px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .mode-switch {
            display: flex;
            background: #f0f0f0;
            padding: 5px;
            border-radius: 30px;
            margin: 20px 30px;
        }

        .mode-btn {
            flex: 1;
            padding: 12px 30px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
            color: #666;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .progress-section {
            padding: 0 30px;
            margin-bottom: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #f0f0f0;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 6px;
            transition: width 0.5s ease;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }

        .card-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
        }

        .card-wrapper {
            perspective: 1000px;
            width: 100%;
            max-width: 380px;
            height: 600px;
            cursor: pointer;
            position: relative;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s ease;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* 淡黄色背景 */
            background: linear-gradient(145deg, #fffde7 0%, #fff9c4 100%);
            border: 2px solid #fdd835;
        }

        .card-back {
            transform: rotateY(180deg);
            background: linear-gradient(145deg, #fff9c4 0%, #fff59d 100%);
        }

        .card-word {
            font-size: 36px;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
            word-break: break-word;
        }

        .card-pronunciation {
            font-size: 18px;
            color: #666;
            margin-bottom: 20px;
            font-style: italic;
        }

        .card-example {
            font-size: 16px;
            color: #555;
            text-align: center;
            line-height: 1.6;
            margin-bottom: 25px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .card-meaning {
            font-size: 20px;
            color: #333;
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
        }

        .audio-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .audio-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .audio-btn:active {
            transform: translateY(0);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-know {
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
            color: white;
        }

        .btn-forgot {
            background: linear-gradient(135deg, #f44336 0%, #da190b 100%);
            color: white;
        }

        .btn-next {
            background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%);
            color: white;
        }

        .btn-prev {
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            color: white;
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .review-schedule {
            padding: 30px;
            background: #f9f9f9;
            margin-top: 20px;
        }

        .review-schedule h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .review-table {
            width: 100%;
            border-collapse: collapse;
        }

        .review-table th,
        .review-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .review-table th {
            background: #f0f0f0;
            font-weight: 600;
            color: #555;
        }

        .review-table tr:hover {
            background: #f5f5f5;
        }

        .schedule-due {
            color: #f44336;
            font-weight: 600;
        }

        .schedule-ok {
            color: #4caf50;
            font-weight: 600;
        }

        .flip-hint {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 30px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-new {
            background: #e3f2fd;
            color: #2196f3;
        }

        .badge-review {
            background: #fff3e0;
            color: #ff9800;
        }

        .badge-mastered {
            background: #e8f5e9;
            color: #4caf50;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .card-wrapper {
                height: 500px;
            }

            .card-word {
                font-size: 28px;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .control-btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 英语单词闪卡系统</h1>
            <div class="header-stats">
                <div class="stat-item">
                    <span>📖</span>
                    <span id="totalWords">0</span> 词汇
                </div>
                <div class="stat-item">
                    <span>✅</span>
                    <span id="masteredWords">0</span> 已掌握
                </div>
                <div class="stat-item">
                    <span>🔄</span>
                    <span id="reviewWords">0</span> 待复习
                </div>
            </div>
        </div>

        <div class="mode-switch">
            <button class="mode-btn active" onclick="switchMode('learn')" id="learnModeBtn">
                📖 学习模式
            </button>
            <button class="mode-btn" onclick="switchMode('review')" id="reviewModeBtn">
                🔄 复习模式
            </button>
        </div>

        <div class="progress-section">
            <div class="progress-text">
                <span id="progressLabel">学习进度</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
        </div>

        <div class="card-container" id="cardContainer">
            <div class="card-wrapper" id="cardWrapper" onclick="flipCard()">
                <div class="card" id="flashcard">
                    <div class="card-face">
                        <div class="card-word" id="cardWord">点击开始学习</div>
                        <div class="card-pronunciation" id="cardPronunciation"></div>
                        <div class="card-example" id="cardExample"></div>
                        <button class="audio-btn" onclick="event.stopPropagation(); playAudio('word')">
                            🔊 播放单词发音
                        </button>
                    </div>
                    <div class="card-face card-back">
                        <div class="card-meaning" id="cardMeaning"></div>
                        <button class="audio-btn" onclick="event.stopPropagation(); playAudio('meaning')">
                            🔊 播放中文释义
                        </button>
                    </div>
                </div>
            </div>
            <div class="flip-hint">
                <span>👆 点击卡片翻转</span>
            </div>
        </div>

        <div class="controls" id="controls">
            <button class="control-btn btn-prev" onclick="prevCard()" id="prevBtn">
                ⬅️ 上一个
            </button>
            <button class="control-btn btn-know" onclick="markAsKnow()" id="knowBtn">
                ✅ 认识
            </button>
            <button class="control-btn btn-forgot" onclick="markAsForgot()" id="forgotBtn">
                ❌ 不认识
            </button>
            <button class="control-btn btn-next" onclick="nextCard()" id="nextBtn">
                下一个 ➡️
            </button>
        </div>

        <div class="review-schedule" id="reviewSchedule" style="display: none;">
            <h3>📅 复习计划 (艾宾浩斯曲线)</h3>
            <table class="review-table">
                <thead>
                    <tr>
                        <th>单词</th>
                        <th>当前状态</th>
                        <th>下次复习</th>
                        <th>间隔</th>
                    </tr>
                </thead>
                <tbody id="reviewTableBody">
                </tbody>
            </table>
        </div>
    </div>

    { word: "clinic, hospital, airport, kitchen, apartment", meaning: "诊所，医院，机场，厨房，公寓", example: "This is how we use the word \"clinic, hospital, airport, kitchen, apartment\" in English." },
    { word: "ambition, courage, patience, determination, energy", meaning: "野心，勇气，耐心，决心，精力", example: "This is how we use the word \"ambition, courage, patience, determination, energy\" in English." }
];

// Total words: 552

        // 学习状态管理
        let currentMode = 'learn';
        let currentIndex = 0;
        let isFlipped = false;
        let learnedWords = new Set();
        let reviewSchedule = {};
        let wordStatus = {}; // 'new', 'learning', 'reviewing', 'mastered'

        // 初始化词汇状态
        vocabularyData.forEach((word, index) => {
            wordStatus[index] = {
                status: 'new',
                interval: 1,
                easeFactor: 2.5,
                nextReview: Date.now(),
                reviewCount: 0,
                successCount: 0
            };
        });

        // 初始化
        function init() {
            updateStats();
            loadCard();
            updateProgress();
        }

        // 切换模式
        function switchMode(mode) {
            currentMode = mode;
            
            document.getElementById('learnModeBtn').classList.toggle('active', mode === 'learn');
            document.getElementById('reviewModeBtn').classList.toggle('active', mode === 'review');
            document.getElementById('reviewSchedule').style.display = mode === 'review' ? 'block' : 'none';
            
            if (mode === 'review') {
                updateReviewTable();
                currentIndex = findNextDueCard();
            } else {
                currentIndex = findNextNewCard();
            }
            
            loadCard();
            updateProgress();
        }

        // 查找下一个新单词
        function findNextNewCard() {
            for (let i = 0; i < vocabularyData.length; i++) {
                if (wordStatus[i].status === 'new' || wordStatus[i].status === 'learning') {
                    return i;
                }
            }
            return 0;
        }

        // 查找下一个待复习的单词
        function findNextDueCard() {
            const now = Date.now();
            for (let i = 0; i < vocabularyData.length; i++) {
                if (wordStatus[i].status === 'learning' || wordStatus[i].status === 'reviewing') {
                    if (wordStatus[i].nextReview <= now) {
                        return i;
                    }
                }
            }
            return 0;
        }

        // 加载卡片
        function loadCard() {
            const wordData = vocabularyData[currentIndex];
            const status = wordStatus[currentIndex];
            
            document.getElementById('cardWord').textContent = wordData.word;
            document.getElementById('cardPronunciation').textContent = `/${wordData.word}/`;
            document.getElementById('cardExample').textContent = wordData.example;
            document.getElementById('cardMeaning').textContent = wordData.meaning;
            
            // 重置卡片状态
            isFlipped = false;
            document.getElementById('flashcard').classList.remove('flipped');
            
            updateButtons();
        }

        // 翻转卡片
        function flipCard() {
            isFlipped = !isFlipped;
            document.getElementById('flashcard').classList.toggle('flipped');
        }

        // 更新按钮状态
        function updateButtons() {
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === vocabularyData.length - 1;
        }

        // 上一个卡片
        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                loadCard();
            }
        }

        // 下一个卡片
        function nextCard() {
            if (currentIndex < vocabularyData.length - 1) {
                currentIndex++;
                loadCard();
            }
        }

        // 标记为认识
        function markAsKnow() {
            const status = wordStatus[currentIndex];
            
            status.successCount++;
            status.reviewCount++;
            
            // 艾宾浩斯算法更新
            if (status.interval === 1) {
                status.interval = 2;
            } else {
                status.interval = Math.round(status.interval * status.easeFactor);
            }
            
            if (status.successCount >= 3) {
                status.status = 'mastered';
                learnedWords.add(currentIndex);
            } else {
                status.status = 'reviewing';
            }
            
            status.nextReview = Date.now() + status.interval * 24 * 60 * 60 * 1000; // 转换为毫秒
            
            updateStats();
            updateProgress();
            moveToNextCard();
        }

        // 标记为不认识
        function markAsForgot() {
            const status = wordStatus[currentIndex];
            
            status.successCount = 0;
            status.reviewCount++;
            status.interval = 1;
            status.easeFactor = Math.max(1.3, status.easeFactor - 0.2);
            status.status = 'learning';
            status.nextReview = Date.now() + 1 * 24 * 60 * 60 * 1000; // 1天后复习
            
            updateStats();
            updateProgress();
            moveToNextCard();
        }

        // 移动到下一张卡片
        function moveToNextCard() {
            if (currentMode === 'learn') {
                currentIndex = findNextNewCard();
                if (currentIndex === 0 && wordStatus[0].status === 'mastered') {
                    alert('🎉 恭喜！所有单词已完成学习！');
                }
            } else {
                currentIndex = findNextDueCard();
                updateReviewTable();
            }
            
            loadCard();
        }

        // 播放音频
        function playAudio(type) {
            const wordData = vocabularyData[currentIndex];
            const text = type === 'word' ? wordData.word : wordData.meaning;
            const utterance = new SpeechSynthesisUtterance(text);
            
            if (type === 'word') {
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
            } else {
                utterance.lang = 'zh-CN';
                utterance.rate = 1.0;
            }
            
            speechSynthesis.speak(utterance);
        }

        // 更新统计
        function updateStats() {
            const total = vocabularyData.length;
            const mastered = learnedWords.size;
            const review = vocabularyData.filter((_, i) => {
                const status = wordStatus[i];
                return status.status === 'learning' || status.status === 'reviewing';
            }).length;
            
            document.getElementById('totalWords').textContent = total;
            document.getElementById('masteredWords').textContent = mastered;
            document.getElementById('reviewWords').textContent = review;
        }

        // 更新进度
        function updateProgress() {
            const total = vocabularyData.length;
            let progress = 0;
            let label = '学习进度';
            
            if (currentMode === 'learn') {
                const learned = vocabularyData.filter((_, i) => 
                    wordStatus[i].status !== 'new'
                ).length;
                progress = Math.round((learned / total) * 100);
            } else {
                const dueCards = vocabularyData.filter((_, i) => {
                    const status = wordStatus[i];
                    const now = Date.now();
                    return (status.status === 'learning' || status.status === 'reviewing') && 
                           status.nextReview <= now;
                }).length;
                progress = dueCards === 0 ? 100 : Math.round(((vocabularyData.length - dueCards) / vocabularyData.length) * 100);
                label = '复习进度';
            }
            
            document.getElementById('progressLabel').textContent = label;
            document.getElementById('progressPercent').textContent = progress + '%';
            document.getElementById('progressFill').style.width = progress + '%';
        }

        // 更新复习表
        function updateReviewTable() {
            const tbody = document.getElementById('reviewTableBody');
            tbody.innerHTML = '';
            
            const now = Date.now();
            const reviewWords = vocabularyData.map((word, i) => ({
                word,
                index: i,
                status: wordStatus[i]
            })).filter(item => item.status.status !== 'new')
              .sort((a, b) => a.status.nextReview - b.status.nextReview);
            
            reviewWords.forEach(item => {
                const dueDate = new Date(item.status.nextReview);
                const isDue = item.status.nextReview <= now;
                const daysLeft = Math.ceil((item.status.nextReview - now) / (24 * 60 * 60 * 1000));
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.word}</td>
                    <td><span class="badge ${getStatusBadgeClass(item.status.status)}">${getStatusText(item.status.status)}</span></td>
                    <td class="${isDue ? 'schedule-due' : 'schedule-ok'}">${dueDate.toLocaleDateString()}</td>
                    <td>${daysLeft <= 0 ? '今天' : daysLeft + '天后'}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 获取状态徽章样式
        function getStatusBadgeClass(status) {
            switch(status) {
                case 'new': return 'badge-new';
                case 'learning': return 'badge-review';
                case 'reviewing': return 'badge-review';
                case 'mastered': return 'badge-mastered';
                default: return '';
            }
        }

        // 获取状态文本
        function getStatusText(status) {
            switch(status) {
                case 'new': return '新词';
                case 'learning': return '学习中';
                case 'reviewing': return '复习中';
                case 'mastered': return '已掌握';
                default: return status;
            }
        }

        // 页面加载时初始化
        window.onload = init;
    </script>
</body>
</html>
